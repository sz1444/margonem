<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groli - Event Heros Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode Palette (Default) */
         
            --dc-green: #23a559;
            --dc-yellow: #f0b232;
            --dc-red: #f23f43;
            --dc-blurple: #5865f2;

            --dc-bg-main: #ffffff;
            --dc-bg-side: #f2f3f5;
            --dc-bg-header: #ebedef;
            --dc-text-normal: #313338;
            --dc-text-muted: #5c6370;
            --dc-card-hover: rgba(0, 0, 0, 0.04);
            --dc-border: rgba(0, 0, 0, 0.08);
            --dc-chip-bg: #e3e5e8;
            --dc-separator: rgba(0, 0, 0, 0.1);
        }

        body.light-theme {
            /* Light Mode Palette */
               --dc-bg-main: #0e0e10;
            --dc-bg-side: #0a0a0b;
            --dc-bg-header: #050506;
            --dc-text-normal: #dbdee1;
            --dc-text-muted: #80848e;
              --dc-card-hover: rgba(255, 255, 255, 0.03);
            --dc-border: rgba(255, 255, 255, 0.05);
            --dc-chip-bg: #050506;
            --dc-separator: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dc-bg-header);
            color: var(--dc-text-normal);
            margin: 0;
            overflow: hidden;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* Discord Scrollbar */
        .dc-scroll::-webkit-scrollbar { width: 3px; }
        .dc-scroll::-webkit-scrollbar-track { background: var(--dc-bg-side); }
        .dc-scroll::-webkit-scrollbar-thumb { 
            background: var(--dc-border); 
            border-radius: 10px; 
        }

        /* Top Bar styling */
        .dc-header {
            height: 48px;
            background-color: var(--dc-bg-main);
            border-bottom: 1px solid var(--dc-border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Server-like Column */
        .dc-column {
            background-color: var(--dc-bg-side);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--dc-border);
        }

        /* Channel Item look */
        .location-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px;
            margin: 5px 4px;
            border-radius: 4px;
            cursor: default;
            transition: background 0.1s ease;
        }

        .location-item:hover {
            background-color: var(--dc-card-hover);
        }

        /* Status badges */
        .dc-chip {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            background-color: var(--dc-chip-bg);
            color: var(--dc-text-muted);
            min-width: 50px;
            text-align: center;
            border: 1px solid var(--dc-border);
        }

        .dc-chip.active {
            background-color: var(--dc-blurple);
            color: white;
            border-color: transparent;
        }

        /* Time based highlights */
        .row-fresh { color: var(--dc-text-normal) !important; font-weight: 600; }
        .row-fresh .status-dot-indicator { background-color: var(--dc-green); box-shadow: 0 0 8px rgba(35, 165, 89, 0.4); }
        
        .row-warning { color: var(--dc-text-normal) !important; }
        .row-warning .status-dot-indicator { background-color: var(--dc-yellow); }

        .row-danger { color: var(--dc-text-muted) !important; }
        .row-danger .status-dot-indicator { background-color: var(--dc-red); opacity: 0.4; }

        .status-dot-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--dc-text-muted);
            flex-shrink: 0;
        }

        .category-header {
            padding: 12px 16px 8px 16px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--dc-text-muted);
        }

        .category-header:hover { color: var(--dc-text-normal); }

        .time-label {
            font-size: 9px;
            font-weight: 600;
            font-family: monospace;
            white-space: nowrap;
            background-color: var(--dc-chip-bg);
            border: 1px solid var(--dc-border);
        }

        /* Subtle separator */
        .group-separator {
            height: 1px;
            background-color: var(--dc-separator);
            margin: 10px 14px;
            border: none;
        }

        /* Theme Toggle Button */
        #theme-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            color: var(--dc-text-muted);
            transition: background 0.2s, color 0.2s;
        }
        #theme-toggle:hover {
            background-color: var(--dc-card-hover);
            color: var(--dc-text-normal);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Auth Backdrop -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black hidden">
        <div class="bg-[#111214] p-10 rounded-xl shadow-2xl max-w-sm w-full mx-4 text-center border border-white/5">
            <div class="w-16 h-16 bg-[#5865f2] rounded-2xl flex items-center justify-center mx-auto mb-6">
                <span class="material-icons text-white text-3xl">terminal</span>
            </div>
            <h1 class="text-xl font-bold text-white mb-2">Autoryzacja systemu</h1>
            <p class="text-[#80848e] text-sm mb-8">Połącz się z Discordem, aby kontynuować.</p>
            <button id="dc-login-btn" class="w-full bg-[#5865f2] hover:bg-[#4752c4] text-white font-bold py-3 rounded transition-colors text-sm uppercase tracking-wider">
                Zaloguj się
            </button>
        </div>
    </div>

    <!-- Discord Header -->
    <header class="dc-header shrink-0">
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 px-2 py-1 bg-black/5 dark:bg-white/5 rounded">
                <h1 class="text-[10px] font-black uppercase tracking-widest">Event Heros Helper</h1>
            </div>
        </div>
        
        <div class="flex gap-5 items-center">
            <div class="flex flex-col items-end">
                <span class="text-[8px] text-[#80848e] font-bold uppercase leading-tight">Status sieci</span>
                <span id="status-indicator" class="text-[10px] font-bold text-[#23a559]">POŁĄCZONY</span>
            </div>

                <div id="theme-toggle" title="Przełącz motyw">
                <span class="material-icons text-lg" id="theme-icon">dark_mode</span>
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-grow p-2 overflow-hidden bg-transparent">
        <div class="grid grid-cols-1 lg:grid-cols-3 h-full gap-2">
            
            <!-- Column: P -->
            <div class="dc-column">
                <div class="category-header">
                    Monsieur Poulet (173h)
                </div>
                <div id="grid-p" class="flex-grow overflow-y-auto dc-scroll px-1 pb-4"></div>
            </div>

            <!-- Column: N -->
            <div class="dc-column">
                <div class="category-header">
                    Kur Nadworny (231p)
                </div>
                <div id="grid-n" class="flex-grow overflow-y-auto dc-scroll px-1 pb-4"></div>
            </div>

            <!-- Column: S -->
            <div class="dc-column">
                <div class="category-header">
                    Kurzy Ślepiec (266b)
                </div>
                <div id="grid-s" class="flex-grow overflow-y-auto dc-scroll px-1 pb-4"></div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 text-center">
        <span class="text-[9px] font-bold text-[#4e5058] uppercase tracking-widest">2026 &copy; By Groli</span>
    </footer>

    <script>
        const BACKEND_URL = "https://margone-api.onrender.com";
        const CLIENT_ID = "1488794373775687782";
        const REDIRECT_URI = encodeURIComponent(window.location.origin + window.location.pathname);
        const DISCORD_AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify%20guilds.members.read`;

        const sections = [
            { id: "p", data: [["Ruiny Tass Zhil", "#3b82f6"], ["Błota Sham Al", "#3b82f6"], ["Głusza Świstu", "#3b82f6"], ["Las Porywów Wiatru", "#3b82f6"], ["Kwieciste Kresy", "#3b82f6"], ["Grań Gawronich Piór", "#3b82f6"], ["Nawiedzone Komnaty - przedsionek", "#f97316"], ["Nawiedzone Kazamaty p.1 s.1", "#f97316"], ["Nawiedzone Kazamaty p.1 s.2", "#f97316"], ["Nawiedzone Kazamaty p.2 s.1", "#f97316"], ["Nawiedzone Kazamaty p.2 s.2", "#f97316"], ["Nawiedzone Kazamaty p.3 s.1", "#f97316"], ["Nawiedzone Kazamaty p.3 s.2", "#f97316"], ["Nawiedzone Kazamaty p.4", "#f97316"], ["Sala Dowódcy Orków", "#f97316"], ["Nawiedzone Komnaty - zachód", "#f97316"], ["Nawiedzone Komnaty - wschód", "#f97316"], ["Sala Rady Orków", "#f97316"], ["Sala Królewska", "#f97316"], ["Komnaty Czarnej Gwardii - wschód", "#f97316"], ["Komnata Czarnej Perły", "#f97316"], ["Komnaty Czarnej Gwardii - zachód", "#f97316"]] },
            { id: "n", data: [["Gęste Sploty", "#22c55e"], ["Zmurszały Łęg", "#22c55e"], ["Garb Połamanych Konarów", "#22c55e"], ["Zalesiony Step", "#22c55e"], ["Głusza Srebrnego Rogu", "#22c55e"], ["Knieja Lunarnych Głazów", "#22c55e"], ["Szepty Menhirów", "#22c55e"], ["Gaj Księżycowego Blasku", "#22c55e"], ["Zakątek Nocnych Szelestów", "#22c55e"], ["Zarosłe Szczeliny p.1 s.1", "#22c55e"], ["Zarosłe Szczeliny p.1 s.2", "#22c55e"], ["Zarosłe Szczeliny p.1 s.3", "#22c55e"], ["Gardziel Podgnitych Mchów p.1", "#22c55e"], ["Gardziel Podgnitych Mchów p.2", "#22c55e"], ["Zacienione Wnęki p.1 s.1", "#22c55e"], ["Zacienione Wnęki p.1 s.2", "#22c55e"], ["Zacienione Wnęki p.2 s.1", "#22c55e"], ["Zacienione Wnęki p.2 s.2", "#22c55e"], ["Skryty Azyl", "#3b82f6"], ["Dolina Potoku Śmierci", "#3b82f6"], ["Złota Dąbrowa", "#3b82f6"], ["Strumienie Szemrzących Wód", "#3b82f6"], ["Zawodzące Kaskady", "#3b82f6"], ["Jaszczurze Korytarze p.1 s.1", "#3b82f6"], ["Jaszczurze Korytarze p.1 s.2", "#3b82f6"], ["Jaszczurze Korytarze p.1 s.3", "#3b82f6"], ["Jaszczurze Korytarze p.1 s.4", "#3b82f6"], ["Jaszczurze Korytarze p.2 s.1", "#3b82f6"], ["Jaszczurze Korytarze p.2 s.2", "#3b82f6"], ["Jaszczurze Korytarze p.2 s.3", "#3b82f6"], ["Jaszczurze Korytarze p.2 s.4", "#3b82f6"]] },
            { id: "s", data: [["Potępione Zamczysko", "#06b6d4"], ["Potępione Zamczysko - lochy z. p.1", "#06b6d4"], ["Potępione Zamczysko - lochy z. p.2", "#06b6d4"], ["Potępione Zamczysko - głębokie", "#06b6d4"], ["Potępione Zamczysko - lochy w. p.2", "#06b6d4"], ["Potępione Zamczysko - lochy w. p.1", "#06b6d4"], ["Potępione Zamczysko - korytarz z.", "#06b6d4"], ["Potępione Zamczysko - korytarz w.", "#06b6d4"], ["Potępione Zamczysko - zachodnia", "#06b6d4"], ["Potępione Zamczysko - wschodnia", "#06b6d4"], ["Potępione Zamczysko - sala ofiarna", "#06b6d4"], ["Potępione Zamczysko - łącznik z.", "#06b6d4"], ["Potępione Zamczysko - łącznik w.", "#06b6d4"], ["Potępione Zamczysko - północna", "#06b6d4"], ["Zachodnie Zbocze", "#06b6d4"], ["Plugawe Pustkowie", "#06b6d4"], ["Jęczywąwóz", "#06b6d4"], ["Pogranicze Wisielców", "#06b6d4"], ["Skalisty Styk", "#06b6d4"], ["Zacisze Zimnych Wiatrów", "#06b6d4"], ["Pustynne Katakumby", "#d946ef"], ["Pustynne Katakumby - sala 1", "#d946ef"], ["Pustynne Katakumby - sala 2", "#d946ef"], ["Komnaty Bezdusznych - sala 1", "#d946ef"], ["Komnaty Bezdusznych - sala 2", "#d946ef"], ["Katakumby Skrytobójców", "#d946ef"], ["Katakumby Opętanych Dusz", "#d946ef"], ["Korytarz Porzuconych Marzeń", "#d946ef"], ["Katakumby Gwałtownej ŚMIERCI", "#d946ef"]] }
        ];

        let discordToken = localStorage.getItem('mapSync_dcToken');
        let cachedData = {};
        let socket = null;
        let lastMsgTime = 0;

        function init() {
            initTheme();
            checkUrlForToken();
            if (!discordToken) {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dc-login-btn').onclick = () => window.location.href = DISCORD_AUTH_URL;
                return;
            }
            initSocket();
            setInterval(updateTimers, 1000);
            
            document.getElementById('theme-toggle').onclick = toggleTheme;
        }

        function initTheme() {
            const saved = localStorage.getItem('groli_theme');
            if (saved === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('theme-icon').innerText = 'light_mode';
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-theme');
            document.getElementById('theme-icon').innerText = isLight ? 'light_mode' : 'dark_mode';
            localStorage.setItem('groli_theme', isLight ? 'light' : 'dark');
        }

        function checkUrlForToken() {
            const hash = window.location.hash;
            if (hash.includes("access_token=")) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get("access_token");
                if (token) {
                    localStorage.setItem('mapSync_dcToken', token);
                    discordToken = token;
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }
        }

        function initSocket() {
            const wsUrl = BACKEND_URL.replace("http", "ws") + `?token=${discordToken}`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                document.getElementById('status-indicator').innerText = "POŁĄCZONY";
                document.getElementById('status-indicator').className = "text-[10px] font-bold text-[#23a559]";
                render();
                lastMsgTime = Date.now();
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'init_data') {
                    cachedData = msg.data || {};
                    render();
                } else if (msg.type === 'cell_updated') {
                    cachedData[msg.id] = { val: msg.val, ts: msg.ts };
                    updateCellInUI(msg.id, msg.val);
                }
                lastMsgTime = Date.now();
            };

            socket.onclose = () => {
                document.getElementById('status-indicator').innerText = "ROZŁĄCZONY";
                document.getElementById('status-indicator').className = "text-[10px] font-bold text-[#f23f43]";
                setTimeout(initSocket, 5000);
            };
        }

        function render() {
            let activeMaps = 0;
            sections.forEach(sec => {
                const grid = document.getElementById(`grid-${sec.id}`);
                grid.innerHTML = "";
                
                let lastColor = null;

                sec.data.forEach((mapData, i) => {
                    const idBase = `${sec.id}${i}`;
                    const id1 = `${idBase}_1`, id2 = `${idBase}_2`;
                    
                    if (lastColor && lastColor !== mapData[1]) {
                        const sep = document.createElement('hr');
                        sep.className = "group-separator";
                        grid.appendChild(sep);
                    }
                    lastColor = mapData[1];

                    const row = document.createElement('div');
                    row.id = `row-${idBase}`;
                    row.className = "location-item";
                    
                    row.innerHTML = `
                        <div class="flex items-center flex-grow gap-2 min-w-0 mr-2">
                            <div class="status-dot-indicator"></div>
                            <span id="timer-${id1}-${id2}" class="time-label rounded-[3px] px-2 text-[10px] text-[#4e5058]">BRAK</span>
                            <span class="text-[12px] font-normal truncate tracking-tighter">${mapData[0]}</span>
                        </div>
                        <div class="flex gap-1 shrink-0">
                            <div id="cell-${id1}" class="dc-chip">---</div>
                            <div id="cell-${id2}" class="dc-chip">---</div>
                        </div>
                    `;
                    grid.appendChild(row);
                    updateCellInUI(id1, cachedData[id1]?.val || "");
                    updateCellInUI(id2, cachedData[id2]?.val || "");
                    if (cachedData[id1]?.val || cachedData[id2]?.val) activeMaps++;
                });
            });
            updateTimers();
        }

        function updateCellInUI(id, val) {
            const cell = document.getElementById(`cell-${id}`);
            if (!cell) return;
            cell.innerText = val ? val : "---";
            cell.className = val ? "dc-chip active" : "dc-chip";
        }

        function updateTimers() {
            const now = Date.now();
            let activeMaps = 0;
            sections.forEach(sec => {
                sec.data.forEach((_, i) => {
                    const idBase = `${sec.id}${i}`;
                    const id1 = `${idBase}_1`, id2 = `${idBase}_2`;
                    const ts1 = cachedData[id1]?.ts || 0, ts2 = cachedData[id2]?.ts || 0;
                    const lastTs = Math.max(ts1, ts2);
                    
                    const timerEl = document.getElementById(`timer-${id1}-${id2}`);
                    const rowEl = document.getElementById(`row-${idBase}`);

                    if (cachedData[id1]?.val || cachedData[id2]?.val) activeMaps++;

                    if (timerEl && rowEl && lastTs > 0) {
                        const diff = (now - lastTs) / 1000;
                        const mins = Math.floor(diff / 60), secs = Math.floor(diff % 60).toString().padStart(2, '0');
                        timerEl.innerText = `${mins}:${secs}`;
                        
                        rowEl.classList.remove('row-fresh', 'row-warning', 'row-danger');
                        
                        if (diff < 60) {
                            rowEl.classList.add('row-fresh');
                            timerEl.style.color = "var(--dc-green)";
                        } else if (diff < 120) {
                            rowEl.classList.add('row-warning');
                            timerEl.style.color = "var(--dc-yellow)";
                        } else {
                            rowEl.classList.add('row-danger');
                            timerEl.style.color = "var(--dc-red)";
                        }
                    }
                });
            });
            const gc = document.getElementById('global-count');
            if (gc) gc.innerText = `${activeMaps} / 82`;
        }

        window.onload = init;
    </script>
</body>
</html>
