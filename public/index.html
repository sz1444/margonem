<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groli - Event Heros Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode Palette (Default) */
         
            --dc-green: #23a559;
            --dc-yellow: #f0b232;
            --dc-red: #f23f43;
            --dc-blurple: #5865f2;
            --dc-bg-main: #ffffff;
            --dc-bg-side: #f2f3f5;
            --dc-bg-header: #ebedef;
            --dc-text-normal: #313338;
            --dc-text-muted: #5c6370;
            --dc-card-hover: rgba(0, 0, 0, 0.04);
            --dc-border: rgba(0, 0, 0, 0.08);
            --dc-chip-bg: #e3e5e8;
            --dc-separator: rgba(0, 0, 0, 0.1);
        }

        body.light-theme {
            /* Light Mode Palette */
               --dc-bg-main: #0e0e10;
            --dc-bg-side: #0a0a0b;
            --dc-bg-header: #050506;
            --dc-text-normal: #dbdee1;
            --dc-text-muted: #80848e;
              --dc-card-hover: rgba(255, 255, 255, 0.03);
            --dc-border: rgba(255, 255, 255, 0.05);
            --dc-chip-bg: #050506;
            --dc-separator: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dc-bg-header);
            color: var(--dc-text-normal);
            margin: 0;
            overflow: hidden;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* Discord Scrollbar */
        .dc-scroll::-webkit-scrollbar { width: 3px; }
        .dc-scroll::-webkit-scrollbar-track { background: var(--dc-bg-side); }
        .dc-scroll::-webkit-scrollbar-thumb { 
            background: var(--dc-border); 
            border-radius: 10px; 
        }

        .dc-header {
            height: 48px;
            background-color: var(--dc-bg-main);
            border-bottom: 1px solid var(--dc-border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dc-column {
            background-color: var(--dc-bg-side);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--dc-border);
        }

        .location-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px;
            margin: 5px 4px;
            border-radius: 4px;
            cursor: default;
            transition: background 0.1s ease;
        }

        .location-item:hover {
            background-color: var(--dc-card-hover);
        }

        .dc-chip {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            background-color: var(--dc-chip-bg);
            color: var(--dc-text-muted);
            min-width: 50px;
            text-align: center;
            border: 1px solid var(--dc-border);
        }

        .dc-chip.active {
            background-color: var(--dc-blurple);
            color: white;
            border-color: transparent;
        }

        .row-fresh { color: var(--dc-text-normal) !important; font-weight: 600; }
        .row-fresh .status-dot-indicator { background-color: var(--dc-green); box-shadow: 0 0 8px rgba(35, 165, 89, 0.4); }
        
        .row-warning { color: var(--dc-text-normal) !important; }
        .row-warning .status-dot-indicator { background-color: var(--dc-yellow); }

        .row-danger { color: var(--dc-text-muted) !important; }
        .row-danger .status-dot-indicator { background-color: var(--dc-red); opacity: 0.4; }

        .status-dot-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--dc-text-muted);
            flex-shrink: 0;
        }

        .category-header {
            padding: 12px 16px 8px 16px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dc-text-muted);
            border-bottom: 1px solid var(--dc-border);
        }

        .time-label {
            font-size: 9px;
            font-weight: 600;
            font-family: monospace;
            white-space: nowrap;
            background-color: var(--dc-chip-bg);
            border: 1px solid var(--dc-border);
        }

        .item-legends {
            background: #92471A;
            border: 1px solid #92471A;
            background: radial-gradient(circle,rgba(146, 71, 26, 1) 0%, rgba(146, 71, 26, 0.32) 100%);

        }

        .group-separator {
            height: 1px;
            background-color: var(--dc-separator);
            margin: 10px 14px;
            border: none;
        }

        #theme-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            color: var(--dc-text-muted);
            transition: background 0.2s, color 0.2s;
        }
        #theme-toggle:hover {
            background-color: var(--dc-card-hover);
            color: var(--dc-text-normal);
        }

        /* --- TOOLTIP STYLES --- */
        #tooltip {
            position: fixed;
            pointer-events: none;
            background-color: rgba(0, 0, 0, 0.95);
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.3;
            min-width: 260px;
            max-width: 320px;
            z-index: 9999;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            color: #fff;
        }
        .legendary { color: #fb6a10; font-weight: bold; }
        .item-name { font-size: 14px; margin-bottom: 2px; }
        .item-type { color: #aaa; font-style: italic; margin-bottom: 4px; }
        .item-tip-section { border-top: 1px solid #333; padding: 4px 0; margin-top: 2px; }
        .no-border { border-top: none; }
        .damage { color: #f00; font-weight: bold; }
        .text-light-green { color: #00ff00; }
        .looter { color: #9b59b6; font-size: 10px; display: none; }
        .val { color: #f1c40f; }
        .tip-item-stat-opis { color: #ccc; font-style: italic; font-size: 11px; }
        .prof-icons-holder { color: #3498db; }
    </style>

        /* --- TOOLTIP ENGINE --- */
        function initTooltipEngine() {
            const tooltip = document.getElementById('tooltip');
            const decodeHtml = (html) => {
                const txt = document.createElement("textarea");
                txt.innerHTML = html;
                return txt.value;
            };

            document.addEventListener('mouseover', (e) => {
                const target = e.target.closest('img[tip]');
                if (target) {
                    tooltip.innerHTML = decodeHtml(target.getAttribute('tip'));
                    tooltip.style.display = 'block';
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (tooltip.style.display === 'block') {
                    const offset = 15;
                    let x = e.clientX + offset;
                    let y = e.clientY + offset;

                    // Zapobieganie wychodzeniu poza ekran
                    if (x + tooltip.offsetWidth > window.innerWidth) x = e.clientX - tooltip.offsetWidth - offset;
                    if (y + tooltip.offsetHeight > window.innerHeight) y = e.clientY - tooltip.offsetHeight - offset;

                    tooltip.style.left = x + 'px';
                    tooltip.style.top = y + 'px';
                }
            });

            document.addEventListener('mouseout', (e) => {
                if (e.target.closest('img[tip]')) tooltip.style.display = 'none';
            });
        }

            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                document.getElementById('status-indicator').innerText = "POŁĄCZONY";
                document.getElementById('status-indicator').className = "text-[10px] font-bold text-[#5865f2]";
                render();
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'init_data') {
                    cachedData = msg.data || {};
                    render();
                } else if (msg.type === 'cell_updated') {
                    cachedData[msg.id] = { val: msg.val, ts: msg.ts };
                    updateCellInUI(msg.id, msg.val);
                }
            };

            socket.onclose = () => {
                document.getElementById('status-indicator').innerText = "ROZŁĄCZONY";
                document.getElementById('status-indicator').className = "text-[10px] font-bold text-[#f23f43]";
                setTimeout(initSocket, 5000);
            };
        }

        function render() {
            sections.forEach(sec => {
                const grid = document.getElementById(`grid-${sec.id}`);
                if(!grid) return;
                grid.innerHTML = "";
                let lastColor = null;

                sec.data.forEach((mapData, i) => {
                    const idBase = `${sec.id}${i}`;
                    const id1 = `${idBase}_1`, id2 = `${idBase}_2`;
                    
                    if (lastColor && lastColor !== mapData[1]) {
                        const sep = document.createElement('hr');
                        sep.className = "group-separator";
                        grid.appendChild(sep);
                    }
                    lastColor = mapData[1];

                    const row = document.createElement('div');
                    row.id = `row-${idBase}`;
                    row.className = "location-item";
                    
                    row.innerHTML = `
                        <div class="flex items-center flex-grow gap-2 min-w-0 mr-2">
                            <div class="status-dot-indicator"></div>
                            <span id="timer-${id1}-${id2}" class="time-label rounded-[3px] px-2 text-[10px] text-[#4e5058]">BRAK</span>
                            <span class="text-[12px] font-normal truncate tracking-tighter">${mapData[0]}</span>
                        </div>
                        <div class="flex gap-1 shrink-0">
                            <div id="cell-${id1}" class="dc-chip">---</div>
                            <div id="cell-${id2}" class="dc-chip">---</div>
                        </div>
                    `;
                    grid.appendChild(row);
                    updateCellInUI(id1, cachedData[id1]?.val || "");
                    updateCellInUI(id2, cachedData[id2]?.val || "");
                });
            });
            updateTimers();
        }

        function updateCellInUI(id, val) {
            const cell = document.getElementById(`cell-${id}`);
            if (!cell) return;
            cell.innerText = val ? val : "---";
            cell.className = val ? "dc-chip active" : "dc-chip";
        }

        function updateTimers() {
            const now = Date.now();
            sections.forEach(sec => {
                sec.data.forEach((_, i) => {
                    const idBase = `${sec.id}${i}`;
                    const id1 = `${idBase}_1`, id2 = `${idBase}_2`;
                    const ts1 = cachedData[id1]?.ts || 0, ts2 = cachedData[id2]?.ts || 0;
                    const lastTs = Math.max(ts1, ts2);
                    
                    const timerEl = document.getElementById(`timer-${id1}-${id2}`);
                    const rowEl = document.getElementById(`row-${idBase}`);

                    if (timerEl && rowEl && lastTs > 0) {
                        const diff = (now - lastTs) / 1000;
                        const mins = Math.floor(diff / 60), secs = Math.floor(diff % 60).toString().padStart(2, '0');
                        timerEl.innerText = `${mins}:${secs}`;
                        
                        rowEl.classList.remove('row-fresh', 'row-warning', 'row-danger');
                        
                        if (diff < 60) {
                            rowEl.classList.add('row-fresh');
                            timerEl.style.color = "var(--dc-green)";
                        } else if (diff < 120) {
                            rowEl.classList.add('row-warning');
                            timerEl.style.color = "var(--dc-yellow)";
                        } else {
                            rowEl.classList.add('row-danger');
                            timerEl.style.color = "var(--dc-red)";
                        }
                    }
                });
            });
        }

        window.onload = init;
    </script>
</body>
</html>
