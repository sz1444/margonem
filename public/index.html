<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Heros Helper - Groli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode Palette (Default) */
            --dc-green: #23a559;
            --dc-yellow: #f0b232;
            --dc-red: #f23f43;
            --dc-blurple: #5865f2;
            --dc-bg-main: #ffffff;
            --dc-bg-side: #f2f3f5;
            --dc-bg-header: #ebedef;
            --dc-text-normal: #313338;
            --dc-text-muted: #5c6370;
            --dc-card-hover: rgba(0, 0, 0, 0.04);
            --dc-border: rgba(0, 0, 0, 0.08);
            --dc-chip-bg: #e3e5e8;
            --dc-separator: rgba(0, 0, 0, 0.1);
        }

        body.light-theme {
            /* Light Mode Palette */
            --dc-bg-main: #0e0e10;
            --dc-bg-side: #0a0a0b;
            --dc-bg-header: #050506;
            --dc-text-normal: #dbdee1;
            --dc-text-muted: #80848e;
            --dc-card-hover: rgba(255, 255, 255, 0.03);
            --dc-border: rgba(255, 255, 255, 0.05);
            --dc-chip-bg: #050506;
            --dc-separator: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dc-bg-header);
            color: var(--dc-text-normal);
            margin: 0;
            overflow: hidden;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* Discord Scrollbar */
        .dc-scroll::-webkit-scrollbar { width: 3px; }
        .dc-scroll::-webkit-scrollbar-track { background: var(--dc-bg-side); }
        .dc-scroll::-webkit-scrollbar-thumb { 
            background: var(--dc-border); 
            border-radius: 10px; 
        }

        .dc-header {
            height: 48px;
            background-color: var(--dc-bg-main);
            border-bottom: 1px solid var(--dc-border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dc-column {
            background-color: var(--dc-bg-side);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--dc-border);
        }

        .location-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px;
            margin: 5px 4px;
            border-radius: 4px;
            cursor: default;
            transition: background 0.1s ease;
        }

        .location-item:hover {
            background-color: var(--dc-card-hover);
        }

        .dc-chip {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            background-color: var(--dc-chip-bg);
            color: var(--dc-text-muted);
            min-width: 50px;
            text-align: center;
            border: 1px solid var(--dc-border);
        }

        .dc-chip.active {
            background-color: var(--dc-blurple);
            color: white;
            border-color: transparent;
        }

        .row-fresh { color: var(--dc-text-normal) !important; font-weight: 600; }
        .row-fresh .status-dot-indicator { background-color: var(--dc-green); box-shadow: 0 0 8px rgba(35, 165, 89, 0.4); }
        
        .row-warning { color: var(--dc-text-normal) !important; }
        .row-warning .status-dot-indicator { background-color: var(--dc-yellow); }

        .row-danger { color: var(--dc-text-muted) !important; }
        .row-danger .status-dot-indicator { background-color: var(--dc-red); opacity: 0.4; }

        .status-dot-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--dc-text-muted);
            flex-shrink: 0;
        }

        .category-header {
            padding: 12px 16px 8px 16px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dc-text-muted);
            border-bottom: 1px solid var(--dc-border);
        }

        .time-label {
            font-size: 9px;
            font-weight: 600;
            font-family: monospace;
            white-space: nowrap;
            background-color: var(--dc-chip-bg);
            border: 1px solid var(--dc-border);
        }

        .item-legends {
            background: #92471A;
            border: 1px solid #92471A;
            box-shadow:inset 0 0 3px 3px #000000a7;
        }

        .group-separator {
            height: 1px;
            background-color: var(--dc-separator);
            margin: 10px 14px;
            border: none;
        }

        #theme-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            color: var(--dc-text-muted);
            transition: background 0.2s, color 0.2s;
        }
        #theme-toggle:hover {
            background-color: var(--dc-card-hover);
            color: var(--dc-text-normal);
        }

        /* --- FILTR STYLE --- */
        .hide-row { display: none !important; }
        .dc-switch-wrap { display: flex; align-items: center; gap: 8px; padding-right: 12px; border-right: 1px solid var(--dc-border); margin-right: 8px; }
        .dc-switch { position: relative; width: 28px; height: 16px; }
        .dc-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #80848e; transition: .2s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: white; transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: #23a559; }
        input:checked + .slider:before { transform: translateX(12px); }
    </style>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black hidden">
        <div class="bg-[#111214] p-10 rounded-xl shadow-2xl max-w-sm w-full mx-4 text-center border border-white/5">
            <div class="w-16 h-16 bg-[#5865f2] rounded-2xl flex items-center justify-center mx-auto mb-6">
                <span class="material-icons text-white text-3xl">terminal</span>
            </div>
            <h1 class="text-xl font-bold text-white mb-2">Autoryzacja systemu</h1>
            <p class="text-[#80848e] text-sm mb-8">Połącz się z Discordem, aby kontynuować.</p>
            <button id="dc-login-btn" class="w-full bg-[#5865f2] hover:bg-[#4752c4] text-white font-bold py-3 rounded transition-colors text-sm uppercase tracking-wider">
                Zaloguj się
            </button>
        </div>
    </div>

    <header class="dc-header shrink-0">
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 px-2 py-1 bg-black/5 dark:bg-white/5 rounded">
                <h1 id="header-title" class="text-[10px] font-black uppercase tracking-widest">Event Heros Helper</h1>
            </div>
        </div>
        
        <div class="flex gap-2 items-center">
            <div class="dc-switch-wrap">
                <span style="font-size: 10px; font-weight: 700; color: var(--dc-text-muted); text-transform: uppercase;">Pokaż tylko wolne respy</span>
                <label class="dc-switch">
                    <input type="checkbox" id="global-filter">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="flex gap-5 items-center">
                <div class="flex flex-col items-end">
                    <span class="text-[8px] text-[#80848e] font-bold uppercase leading-tight">Status sieci</span>
                    <span id="status-indicator" class="text-[10px] font-bold text-[#23a559]">POŁĄCZONY</span>
                </div>

                <div id="theme-toggle" title="Przełącz motyw">
                    <span class="material-icons text-lg" id="theme-icon">dark_mode</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow p-2 overflow-hidden bg-transparent">
        <div id="main-grid" class="grid grid-cols-1 lg:grid-cols-3 h-full gap-2">
            </div>
    </main>

    <footer class="py-4 text-center">
        <span id="footer-text" class="text-[9px] font-bold text-[#4e5058] uppercase tracking-widest">2026 &copy; By Groli</span>
    </footer>

    <script>
        const BACKEND_URL = "https://margone-api.onrender.com";
        const CLIENT_ID = "1488794373775687782";
        const REDIRECT_URI = encodeURIComponent(window.location.origin + window.location.pathname);
        const DISCORD_AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify%20guilds.members.read`;

        let discordToken = localStorage.getItem('mapSync_dcToken');
        let cachedData = {};
        let socket = null;
        let sections = []; 

        async function init() {
            initTheme();
            checkUrlForToken();
            
            try {
                const response = await fetch('data.json');
                const config = await response.json();
                sections = config.columns;
                document.getElementById('header-title').innerText = config.event_metadata.title;
                document.getElementById('footer-text').innerHTML = config.event_metadata.footer;
                renderStructure(config.columns);
            } catch (error) { console.error(error); }

            if (!discordToken) {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dc-login-btn').onclick = () => window.location.href = DISCORD_AUTH_URL;
                return;
            }
            initSocket();
            setInterval(updateTimers, 1000);
            document.getElementById('theme-toggle').onclick = toggleTheme;
            
            const filterEl = document.getElementById('global-filter');
            filterEl.checked = new URLSearchParams(window.location.search).get('filter') === 'true';
            filterEl.onchange = (e) => {
                const url = new URL(window.location);
                const isActive = e.target.checked;
                isActive ? url.searchParams.set('filter', 'true') : url.searchParams.delete('filter');
                window.history.replaceState({}, '', url);
                
                if (!isActive) renderStructure(sections); // Przywróć sep
                updateTimers(); // Natychmiastowa aktualizacja (bez lagu 1s)
            };
        }

        function renderStructure(columns) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            columns.forEach(col => {
                const columnDiv = document.createElement('div');
                columnDiv.className = "dc-column";
                let itemsHtml = col.items.map(item => `
                    <div class="relative flex-shrink-0 group item-legends">
                        <div class="border border-[#999] text-md absolute bottom-0 right-0 z-10 px-[2px] py-0 text-[8px] font-bold uppercase rounded-[3px] bg-[#00000054] text-white pointer-events-none">${item.count}</div>
                        <img class="w-8 h-8" src="${item.img}">
                    </div>
                `).join('');
                columnDiv.innerHTML = `
                    <div class="category-header flex justify-between items-center">
                        <span class="flex-shrink-0 flex items-center gap-2">
                            <img class="h-12" src="${col.boss_gif}">
                            ${col.boss_name}
                        </span>
                        <div class="flex gap-0">${itemsHtml}</div>
                    </div>
                    <div id="grid-${col.id}" class="flex-grow overflow-y-auto dc-scroll px-1 pb-4"></div>
                `;
                grid.appendChild(columnDiv);
                renderMapsInColumn(col);
            });
        }

        function renderMapsInColumn(col) {
            const gridContainer = document.getElementById(`grid-${col.id}`);
            let lastColor = null;
            col.maps.forEach((mapData, i) => {
                const idBase = `${col.id}${i}`;
                if (lastColor && lastColor !== mapData[1]) {
                    const sep = document.createElement('hr');
                    sep.className = "group-separator";
                    gridContainer.appendChild(sep);
                }
                lastColor = mapData[1];
                const row = document.createElement('div');
                row.id = `row-${idBase}`;
                row.className = "location-item";
                row.dataset.originalIndex = i; 
                row.innerHTML = `
                    <div class="flex items-center flex-grow gap-2 min-w-0 mr-2">
                        <div class="status-dot-indicator"></div>
                        <span id="timer-${idBase}_1-${idBase}_2" class="time-label rounded-[3px] px-2 text-[10px] text-[#4e5058]">BRAK</span>
                        <span class="text-[12px] font-normal truncate tracking-tighter">${mapData[0]}</span>
                    </div>
                    <div class="flex gap-1 shrink-0">
                        <div id="cell-${idBase}_1" class="dc-chip">---</div>
                        <div id="cell-${idBase}_2" class="dc-chip">---</div>
                    </div>
                `;
                gridContainer.appendChild(row);
                updateCellInUI(`${idBase}_1`, cachedData[`${idBase}_1`]?.val || "");
                updateCellInUI(`${idBase}_2`, cachedData[`${idBase}_2`]?.val || "");
            });
        }

        function initTheme() {
            if (localStorage.getItem('groli_theme') === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('theme-icon').innerText = 'light_mode';
            }
        }
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-theme');
            document.getElementById('theme-icon').innerText = isLight ? 'light_mode' : 'dark_mode';
            localStorage.setItem('groli_theme', isLight ? 'light' : 'dark');
        }
        function checkUrlForToken() {
            const hash = window.location.hash;
            if (hash.includes("access_token=")) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get("access_token");
                if (token) {
                    localStorage.setItem('mapSync_dcToken', token);
                    discordToken = token;
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }
        }
        function initSocket() {
            socket = new WebSocket(BACKEND_URL.replace("http", "ws") + `?token=${discordToken}`);
            socket.onopen = () => {
                document.getElementById('status-indicator').innerText = "POŁĄCZONY";
                document.getElementById('status-indicator').className = "text-[10px] font-bold text-[#23a559]";
            };
            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'init_data') {
                    cachedData = msg.data || {};
                    renderStructure(sections);
                } else if (msg.type === 'cell_updated') {
                    cachedData[msg.id] = { val: msg.val, ts: msg.ts };
                    updateCellInUI(msg.id, msg.val);
                }
            };
            socket.onclose = () => setTimeout(initSocket, 5000);
        }
        function updateCellInUI(id, val) {
            const cell = document.getElementById(`cell-${id}`);
            if (cell) {
                cell.innerText = val ? val : "---";
                cell.className = val ? "dc-chip active" : "dc-chip";
            }
        }

        function updateTimers() {
            const now = Date.now();
            const filterActive = document.getElementById('global-filter')?.checked;
            
            sections.forEach(sec => {
                const grid = document.getElementById(`grid-${sec.id}`);
                if (!grid) return;
                const rowsInCol = [];

                sec.maps.forEach((_, i) => {
                    const idBase = `${sec.id}${i}`;
                    const ts1 = cachedData[`${idBase}_1`]?.ts || 0;
                    const ts2 = cachedData[`${idBase}_2`]?.ts || 0;
                    const lastTs = Math.max(ts1, ts2);
                    const timerEl = document.getElementById(`timer-${idBase}_1-${idBase}_2`);
                    const rowEl = document.getElementById(`row-${idBase}`);

                    if (timerEl && rowEl) {
                        const diff = lastTs > 0 ? (now - lastTs) / 1000 : 9999999;
                        rowEl.dataset.ts = lastTs; 

                        if (lastTs > 0) {
                            const mins = Math.floor(diff / 60), secs = Math.floor(diff % 60).toString().padStart(2, '0');
                            timerEl.innerText = `${mins}:${secs}`;
                            rowEl.classList.remove('row-fresh', 'row-warning', 'row-danger');
                            if (diff < 90) { rowEl.classList.add('row-fresh'); timerEl.style.color = "var(--dc-green)"; }
                            else if (diff < 180) { rowEl.classList.add('row-warning'); timerEl.style.color = "var(--dc-yellow)"; }
                            else { rowEl.classList.add('row-danger'); timerEl.style.color = "var(--dc-red)"; }
                        } else {
                            timerEl.innerText = "BRAK";
                            timerEl.style.color = "var(--dc-text-muted)";
                            rowEl.classList.remove('row-fresh', 'row-warning', 'row-danger');
                        }

                        if (filterActive && diff < 180 && lastTs > 0) rowEl.classList.add('hide-row');
                        else rowEl.classList.remove('hide-row');
                        
                        rowsInCol.push(rowEl);
                    }
                });

                if (filterActive) {
                    grid.querySelectorAll('.group-separator').forEach(s => s.style.display = 'none');
                    rowsInCol.sort((a, b) => parseInt(a.dataset.ts) - parseInt(b.dataset.ts));
                    rowsInCol.forEach(row => grid.appendChild(row));
                }
            });
        }
        window.onload = init;
    </script>
</body>
</html>
